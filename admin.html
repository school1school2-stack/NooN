<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم المسؤول</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <h1>مرحباً أستاذ عبدالعزيز 👋</h1>
        <p>جاري التحقق من الصلاحيات...</p>
    </div>

    <script>
        // كلمة المرور الخاصة بك
        const adminPass = "123456"; 
        const enteredPass = prompt("الرجاء إدخال كلمة مرور المسؤول:");

        if (enteredPass === adminPass) {
            document.body.innerHTML = "<h1>لوحة التحكم 🛠️</h1><p>أهلاً بك يا أستاذ عبدالعزيز في لوحة التحكم الخاصة بك.</p>";
            // هنا يمكنك لاحقاً إضافة كود ربط Firestore لعرض النتائج
        } else {
            alert("كلمة المرور غير صحيحة!");
            window.location.href = "index.html"; // إرجاع الطالب للصفحة الرئيسية
        }
    </script>
</body>
</html>
