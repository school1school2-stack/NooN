<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم المعلم - أ/ عبدالعزيز الفيفي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #212121; text-align: center; margin-bottom: 30px; border-bottom: 2px solid #b19410; padding-bottom: 10px; }
        .btn-refresh { background: #673ab7; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; width: 100%; }
        .btn-refresh:hover { background: #5e35b1; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { background: #212121; color: #ffc107; padding: 15px; text-align: center; }
        td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        tr:hover { background-color: #f9f9f9; }
        .loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 لوحة متابعة نتائج الطلاب</h1>
    <button class="btn-refresh" onclick="fetchResults()">تحديث البيانات الآن</button>
    
    <table>
        <thead>
            <tr>
                <th>اسم الطالب</th>
                <th>الدرجة</th>
                <th>اسم الاختبار</th>
                <th>تاريخ الاختبار</th>
            </tr>
        </thead>
        <tbody id="resultsBody">
            </tbody>
    </table>
    <div id="statusMsg" class="loading"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // نفس بيانات الربط الموجودة في index.html
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd09YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4",
        measurementId: "G-YKJ1PTP9TH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.fetchResults = async () => {
        const body = document.getElementById('resultsBody');
        const msg = document.getElementById('statusMsg');
        body.innerHTML = "";
        msg.innerText = "جاري جلب البيانات من السحابة...";

        try {
            // جلب البيانات مرتبة حسب التاريخ (الأحدث أولاً)
            const q = query(collection(db, "student_results"), orderBy("date", "desc"));
            const snapshot = await getDocs(q);
            
            msg.innerText = "";
            if (snapshot.empty) {
                msg.innerText = "لا توجد نتائج حالياً.";
                return;
            }

            snapshot.forEach(doc => {
                const d = doc.data();
                body.innerHTML += `<tr>
                    <td>${d.name}</td>
                    <td><strong style="color:#1b5e20;">${d.score}</strong></td>
                    <td>${d.quizId}</td>
                    <td style="font-size:0.85rem; color:#666;">${d.date}</td>
                </tr>`;
            });
        } catch (e) {
            msg.innerText = "حدث خطأ: تأكد من اتصالك بالإنترنت.";
            console.error(e);
        }
    };

    // جلب البيانات تلقائياً عند فتح الصفحة
    fetchResults();
</script>

</body>
</html>
